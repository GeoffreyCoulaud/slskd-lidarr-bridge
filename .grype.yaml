# Grype configuration
# https://github.com/anchore/grype#configuration
#
# This file is read by both local `grype` invocations and the anchore/scan-action
# in CI, ensuring VEX suppression is applied identically in both environments.

# VEX documents to apply when filtering/augmenting scan results.
# Add OpenVEX not_affected statements to security/vex.openvex.json to suppress
# CVEs that have been triaged as not exploitable in this deployment context.
vex-documents:
  - security/vex.openvex.json
