name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  # Same quality gate as on PRs — main and version tags must pass it too
  checks:
    uses: ./.github/workflows/checks.yml

  docker:
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # required for OIDC keyless cosign signing
    steps:
      - uses: actions/checkout@v7

      # On a tag push, fail the release if pyproject.toml wasn't bumped to match
      - name: Verify pyproject.toml version matches the tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          file_version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          tag_version="${GITHUB_REF_NAME#v}"
          echo "pyproject.toml: $file_version | tag: $tag_version"
          if [ "$file_version" != "$tag_version" ]; then
            echo "::error::pyproject.toml version ($file_version) does not match pushed tag ($tag_version). Bump the version before tagging."
            exit 1
          fi

      # QEMU lets the amd64 runner emulate arm64 so we can build both arches
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          # main push          -> latest
          # tag push vX.Y.Z     -> vX.Y.Z, vX.Y, vX
          # (major/minor tags are skipped for pre-releases, e.g. v1.2.3-rc.1)
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- SBOM generation and signed attestation ---

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Generate SBOM (OS + Python via Syft)
        # Scans the final pushed image; Syft catalogues both dpkg (OS) and
        # dist-info (Python) packages — no lockfile/base merge needed.
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: /tmp/sbom.cyclonedx.json
          upload-artifact: "false"
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest SBOM (keyless OIDC via cosign)
        # Attaches the SBOM as a signed attestation on the pushed image.
        # Requires id-token: write (OIDC) and packages: write (push to GHCR).
        run: |
          cosign attest \
            --type cyclonedx \
            --predicate /tmp/sbom.cyclonedx.json \
            --yes \
            "ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}"
