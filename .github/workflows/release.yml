name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  # Same quality gate as on PRs — main and version tags must pass it too
  checks:
    uses: ./.github/workflows/checks.yml

  docker:
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      # On a tag push, fail the release if pyproject.toml wasn't bumped to match
      - name: Verify pyproject.toml version matches the tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          file_version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          tag_version="${GITHUB_REF_NAME#v}"
          echo "pyproject.toml: $file_version | tag: $tag_version"
          if [ "$file_version" != "$tag_version" ]; then
            echo "::error::pyproject.toml version ($file_version) does not match pushed tag ($tag_version). Bump the version before tagging."
            exit 1
          fi

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          # main push          -> latest
          # tag push vX.Y.Z     -> vX.Y.Z, vX.Y, vX
          # (major/minor tags are skipped for pre-releases, e.g. v1.2.3-rc.1)
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
