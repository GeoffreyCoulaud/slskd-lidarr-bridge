name: Checks

# Reusable workflow: lint, type-check, and test. Called by the PR workflow
# and by the release workflow so both run the exact same quality gate.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          # Pin uv to the version that resolved uv.lock (matches the Dockerfile)
          version: "0.8.11"
          python-version: "3.13"
          enable-cache: true
          # Distinct cache per job so the parallel jobs don't race to save one shared cache
          cache-suffix: lint
      - name: Install dependencies
        run: uv sync --frozen
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.8.11"
          python-version: "3.13"
          enable-cache: true
          cache-suffix: typecheck
      - name: Install dependencies
        run: uv sync --frozen
      - name: Mypy
        run: uv run mypy

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.8.11"
          python-version: "3.13"
          enable-cache: true
          cache-suffix: test
      - name: Install dependencies
        run: uv sync --frozen
      # pytest enforces 100% coverage via fail_under in pyproject.toml
      - name: Pytest
        run: uv run pytest
